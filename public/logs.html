<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>System log — Marathon Server Auction</title>
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="/css/animations.css" />
  </head>
  <body>
    <div class="scanlines"></div>
    <div class="shell" style="padding-top: 1.5rem">
      <header class="app-header">
        <div class="brand">
          <img src="/assets/logo.png" width="56" height="56" alt="" />
          <div class="brand-text">
            <h1>System log</h1>
            <p>— Host audit trail —</p>
          </div>
        </div>
        <nav class="nav-links">
          <a href="/room.html">Room</a>
          <a href="/history.html">History</a>
          <a href="/rules.html">Rules</a>
          <a href="/logs.html">Logs</a>
          <button type="button" class="ghost" id="btn-logout">Logout</button>
        </nav>
      </header>

      <div class="table-wrap">
        <table class="data">
          <thead>
            <tr>
              <th>Time</th>
              <th>Type</th>
              <th>User</th>
              <th>Squad</th>
              <th>Round</th>
              <th>Meta</th>
            </tr>
          </thead>
          <tbody id="log-body"></tbody>
        </table>
      </div>
    </div>
    <script type="module" src="/js/logs.js"></script>
  </body>
</html>
