<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in — Marathon Server Auction</title>
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="/css/animations.css" />
  </head>
  <body>
    <div class="scanlines"></div>
    <div class="particles" id="particles"></div>
    <div class="login-wrap">
      <div class="hud-panel login-card">
        <div class="brand">
          <img src="/assets/logo.png" width="120" height="120" alt="Marathon Server Auction" />
          <div class="brand-text">
            <h1>Marathon Server</h1>
            <p>— Auction —</p>
          </div>
        </div>
        <div class="login-error" id="login-err"></div>
        <form id="login-form">
          <div class="field">
            <label for="username">Username</label>
            <input id="username" name="username" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem">Enter chamber</button>
        </form>
        <p style="text-align: center; margin-top: 1.25rem; font-size: 0.8rem; color: var(--text-muted)">
          Authorized Marathon Server personnel only.
        </p>
      </div>
    </div>
    <script type="module">
      import { login } from "/js/auth.js";

      const particles = document.getElementById("particles");
      for (let i = 0; i < 18; i++) {
        const s = document.createElement("span");
        s.style.left = `${Math.random() * 100}%`;
        s.style.animationDelay = `${Math.random() * 14}s`;
        particles.appendChild(s);
      }

      document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const err = document.getElementById("login-err");
        err.textContent = "";
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        try {
          const data = await login(username, password);
          sessionStorage.setItem("marathon_ws", data.wsToken);
          window.location.href = "/room.html";
        } catch (x) {
          err.textContent = x.message || "Login failed";
        }
      });
    </script>
  </body>
</html>
